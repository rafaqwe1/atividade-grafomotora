<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação: Desenvolvimento Motor Infantil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
        }

        .fade-in {
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pulse-btn {
            animation: pulse-heartbeat 2s infinite;
        }

        @keyframes pulse-heartbeat {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); /* Mudado para vermelho urgência */
            }
            50% {
                transform: scale(1.03);
                box-shadow: 0 0 0 15px rgba(239, 68, 68, 0);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        .option-btn:active {
            transform: scale(0.98);
            background-color: #EFF6FF;
            border-color: #3B82F6;
        }
    </style>
    <script>
        !function (f, b, e, v, n, t, s) {
            if (f.fbq) return; n = f.fbq = function () {
                n.callMethod ?
                n.callMethod.apply(n, arguments) : n.queue.push(arguments)
            }
            if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0'
            n.queue = []; t = b.createElement(e); t.async = !0
            t.src = v; s = b.getElementsByTagName(e)[0]
            s.parentNode.insertBefore(t, s)
        }(window, document, 'script',
            'https://connect.facebook.net/en_US/fbevents.js')
        fbq('init', '880159754866026')
        fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
            src="https://www.facebook.com/tr?id=880159754866026&ev=PageView&noscript=1" /></noscript>
    </head>

<body class="text-slate-800 flex flex-col min-h-screen">

    <header class="bg-white p-4 shadow-sm border-b border-slate-200 flex justify-center items-center">
        <svg class="w-5 h-5 text-indigo-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
            </path>
        </svg>
        <h1 class="text-sm font-bold text-slate-600 tracking-wide uppercase">Avaliação Segura • 3 a 6 Anos</h1>
    </header>

    <main class="flex-grow flex items-center justify-center p-4 sm:p-6">
        <div id="quiz-container"
            class="bg-white max-w-lg w-full rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-6 pt-0 sm:p-8 border border-slate-100 fade-in">

            <div id="progress-bar-container" class="w-full bg-slate-100 rounded-full h-2 mb-8 hidden overflow-hidden">
                <div id="progress-bar" class="bg-indigo-600 h-2 rounded-full transition-all duration-500 ease-out"
                    style="width: 0%"></div>
            </div>

            <h2 id="question-title"
                class="text-2xl sm:text-3xl font-black text-slate-800 mb-8 text-center leading-tight">
                Descubra o nível de dependência digital do seu filho e o risco de atraso na alfabetização.
            </h2>

            <div id="options-container" class="space-y-4">
                <button onclick="startQuiz()"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 sm:py-5 rounded-xl shadow-lg shadow-indigo-200 transition-all text-lg border-b-4 border-indigo-800 active:border-b-0 active:translate-y-1">
                    INICIAR AVALIAÇÃO GRATUITA
                </button>
            </div>

            <p id="disclaimer" class="text-xs text-slate-400 text-center mt-8 font-medium">Leva menos de 1 minuto. Respostas 100% confidenciais.</p>
        </div>
    </main>

    <script>
        // PERGUNTAS ESTRATÉGICAS DE ALTA CONVERSÃO
        const questions = [
            { question: "1. Em média, quanto tempo por dia seu filho passa no celular, tablet ou TV?", options: ["Menos de 1 hora (Consigo controlar bem)", "Entre 1 e 2 horas (Geralmente para ele comer/ficar quieto)", "Mais de 2 horas (Sinto que ele está dependente)", "Ele chora e faz birra se eu tentar tirar a tela"] },
            { question: "2. Quando ele precisa usar um lápis de cor ou giz de cera, como ele segura?", options: ["Segura firme e desenha sem problemas", "Segura com a mão toda fechada (como um bastão)", "O traço sai fraco, trêmulo ou a mão 'cansa' rápido", "Tem preguiça, foge ou chora ao ver papel e lápis"] },
            { question: "3. Pensando na fase de alfabetização, qual é o seu maior medo hoje?", options: ["Que ele sofra por não conseguir acompanhar a turma", "Que a professora diga que ele tem déficit ou atraso", "Que ele crie um bloqueio e odeie estudar para sempre", "Nenhum, acho que ele vai se sair bem"] },
            { question: "4. A ciência prova que é possível reverter esse bloqueio motor em casa. Você estaria disposta a investir APENAS 15 MINUTOS do seu dia para resolver isso?", options: ["SIM! Eu farei o que for preciso pelo meu filho.", "Não tenho 15 minutos (Prefiro deixar como está)."] }
        ]

        let currentQuestionIndex = 0
        const titleEl = document.getElementById('question-title')
        const optionsContainer = document.getElementById('options-container')
        const progressContainer = document.getElementById('progress-bar-container')
        const progressBar = document.getElementById('progress-bar')
        const disclaimer = document.getElementById('disclaimer')

        function startQuiz() {
            disclaimer.style.display = 'none'
            progressContainer.classList.remove('hidden')
            // Dispara evento de inicio pro Pixel
            fbq('trackCustom', 'StartedQuiz'); 
            showQuestion()
        }

        function showQuestion() {
            const currentQ = questions[currentQuestionIndex]
            titleEl.innerText = currentQ.question
            titleEl.classList.remove('fade-in')
            void titleEl.offsetWidth
            titleEl.classList.add('fade-in')

            optionsContainer.innerHTML = ''
            const progress = ((currentQuestionIndex) / questions.length) * 100
            progressBar.style.width = `${progress}%`

            currentQ.options.forEach(option => {
                const btn = document.createElement('button')
                btn.innerText = option
                // Design focado em fácil leitura para mobile
                btn.className = "option-btn w-full bg-white border-2 border-slate-200 text-slate-700 font-bold py-4 px-5 rounded-xl text-left transition-all duration-200 fade-in shadow-sm hover:border-indigo-300 hover:bg-slate-50 text-base"
                btn.onclick = () => {
                    btn.classList.add('bg-indigo-50', 'border-indigo-500')
                    setTimeout(handleAnswer, 300) 
                }
                optionsContainer.appendChild(btn)
            })
        }

        function handleAnswer() {
            currentQuestionIndex++
            if (currentQuestionIndex < questions.length) {
                showQuestion()
            } else {
                showAnalyzingScreen()
            }
        }

        function showAnalyzingScreen() {
            progressBar.style.width = '100%'
            titleEl.innerText = "Analisando suas respostas..."
            optionsContainer.innerHTML = `
                <div class="flex justify-center my-10 fade-in">
                    <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-indigo-600"></div>
                </div>
                <p class="text-center text-slate-500 font-semibold fade-in">Cruzando dados com padrões de desenvolvimento infantil...</p>
            `
            setTimeout(showResultScreen, 3500)
        }

        function showResultScreen() {
            progressContainer.style.display = 'none'
            // Headine agressiva focada no problema
            titleEl.innerHTML = `<span class="text-red-600 font-black">ALERTA VERMELHO:</span> O uso de telas está causando um Atraso Motor Silencioso no seu filho.`

            // Dispara evento de conclusão pro Pixel
            fbq('trackCustom', 'FinishedQuiz'); 

            optionsContainer.innerHTML = `
                <div class="text-slate-700 text-base space-y-4 mb-6 fade-in leading-relaxed">
                    <p>A dificuldade ou preguiça com o lápis não é culpa dele. A musculatura das mãos dele está enfraquecida pelo excesso de toques no celular.</p>
                    <p>Se nada for feito <strong>agora</strong>, a alfabetização será um pesadelo de choro e frustração.</p>
                    
                    <div class="bg-indigo-50 border-l-4 border-indigo-600 p-4 rounded-r-lg text-indigo-900 shadow-sm mt-4">
                        <strong class="block mb-1 text-indigo-800">A SOLUÇÃO RÁPIDA:</strong> Você respondeu que tem 15 minutos por dia. Isso é tudo que você precisa para destravar a coordenação dele usando o <strong>Kit Desmame Digital + 100 Atividades Grafomotoras</strong>.
                    </div>
                </div>
                
                <div class="bg-red-50 p-3 rounded-lg border border-red-100 mb-6 fade-in text-center">
                    <p class="text-red-700 font-bold text-sm">⚠️ Atenção: Para quem realizou o teste hoje, liberamos um desconto especial que expira ao fechar esta página.</p>
                </div>
                
                <div class="text-center mb-3 fade-in flex flex-col items-center justify-center">
                    <span class="text-slate-400 line-through text-sm font-bold">De R$ 147,00</span>
                    <span class="text-green-600 font-black text-2xl tracking-tight">Por apenas R$ 67,90</span>
                </div>
                
                <a href="https://pay.kiwify.com.br/GtEoYz9" class="pulse-btn block w-full bg-red-600 text-white text-center font-black text-[1.15rem] py-5 px-4 rounded-xl shadow-lg border-b-4 border-red-800 fade-in decoration-none tracking-tight hover:bg-red-700 transition-colors">
                    👉 ACESSAR O KIT COM DESCONTO AGORA
                </a>
                
                <div class="flex justify-center mt-4 space-x-2 fade-in">
                    <span class="text-xs text-slate-400 font-semibold flex items-center">🔒 Compra 100% Segura e Garantida</span>
                </div>
            `
        }
    </script>
</body>

</html>
